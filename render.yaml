services:
  - type: web
    name: barberflow-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install && npx prisma migrate deploy
    startCommand: cd backend && npm start
    envVars:
      - key: DATABASE_URL
        scope: all
      - key: NODE_ENV
        value: production
      - key: BREVO_API_KEY
        scope: all
      - key: JWT_SECRET
        scope: all
    routes:
      - path: /api
        destination: /api

  - type: static
    name: barberflow-frontend
    staticPublishPath: frontend/dist
    buildCommand: cd frontend && npm install && npm run build
    routes:
      - path: /
        destination: /index.html
